name: Playwright Tests

on:
  push:
    branches:
      - main

# Required for GitHub Pages deployment
permissions:
  contents: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test tests/parabank.spec.ts --project=chromium

      - name: Copy Allure history from previous run
        if: always()
        run: |
          git fetch origin gh-pages:gh-pages --depth=1 2>/dev/null || true
          if git show-ref --quiet refs/heads/gh-pages; then
            mkdir -p allure-results/history
            git show gh-pages:history 2>/dev/null | tar x -C allure-results/history 2>/dev/null || \
            git checkout gh-pages -- history 2>/dev/null && cp -r history/. allure-results/history/ 2>/dev/null || true
          fi

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
